name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: uv sync --all-extras

      - name: Run ruff format check
        run: uv run --with ruff ruff format --check opentop tests

      - name: Run ruff lint
        run: uv run --with ruff ruff check opentop tests

      - name: Run pytest
        run: uv run pytest tests/ -n auto

      - name: Run pyright (opentop)
        run: uv run --with pyright pyright opentop

      - name: Run pyright (tests)
        run: uv run --with pyright pyright --project pyrightconfig.tests.json
